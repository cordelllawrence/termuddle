name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            artifact: termuddle-osx-arm64
          - rid: osx-x64
            artifact: termuddle-osx-x64
          - rid: linux-x64
            artifact: termuddle-linux-x64
          - rid: linux-arm64
            artifact: termuddle-linux-arm64
          - rid: win-x64
            artifact: termuddle-win-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish
        run: |
          dotnet publish -c Release --self-contained -r ${{ matrix.rid }} \
            /p:PublishTrimmed=true \
            /p:PublishSingleFile=true \
            /p:Version=${{ env.VERSION }} \
            -o ./output

      - name: Rename binary
        run: |
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            mv ./output/termuddle.exe ./output/${{ matrix.artifact }}
          else
            mv ./output/termuddle ./output/${{ matrix.artifact }}
            chmod +x ./output/${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./output/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE=""
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" \
            $PRERELEASE \
            --title "termuddle $TAG" \
            --generate-notes \
            ./artifacts/termuddle-*/*
